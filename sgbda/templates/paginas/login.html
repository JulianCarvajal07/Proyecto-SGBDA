{% load static %}

<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DB Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>
    <div class="login-card p-5">
        <div class="text-center mb-4">
            <i class="bi bi-database-fill fs-1 text-primary"></i>
            <h2 class="mt-3 fw-bold">SGBDA NetGroup</h2>
            <p class="text-muted">Area Bases de datos</p>
        </div>

        <form>
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" class="form-control form-control-lg bg-dark border-secondary" placeholder="admin@empresa.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control form-control-lg bg-dark border-secondary" placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">Iniciar Sesión</button>
        </form>
    </div>
</body>

</html>
