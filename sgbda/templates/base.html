{% load static %}

<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/objetos-personalizados.css' %}">
    <link rel="stylesheet" href="{% static 'css/mensaje-personalizados.css' %}">
    <link rel="stylesheet" href="{% static 'css/usuarios.css' %}">
    <link rel="stylesheet" href="{% static 'css/conexiones.css' %}">
    <link rel="stylesheet" href="{% static 'css/builds.css' %}">
    <link rel="stylesheet" href="{% static 'css/inventario.css' %}">
    <link rel="stylesheet" href="{% static 'css/clientes.css' %}">
</head>

<body>

<div class="contenedor-abuela">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="contenedor-titulo-p">
            <img src="/media/NG_BLANCO.png" style="width:200px; padding:20px" alt="">
            <h4 class="mb-0 fw-bold">Proyecto OrionSQL</h4>
        </div>
        
        <ul class="nav flex-column">
            <li class="nav-item mb-1"><a href="{% url 'listar_clientes' %}" class="nav-link"><i class="bi bi-building"></i> clientes</a></li>
            <li class="nav-item mb-1"><a href="{% url 'listar_inventario' %}" class="nav-link"><i class="bi bi-box"></i> Inventario</a></li>
            <li class="nav-item mb-1"><a href="{% url 'listar_builds' %}" class="nav-link"><i class="bi bi-arrow-clockwise"></i> Builds</a></li>
            <li class="nav-item mb-1"><a href="{% url 'listar_conexiones' %}" class="nav-link"><i class="bi bi-plug"></i> Conexiones</a></li>
            <li class="nav-item mb-1"><a href="{% url 'listar_usuarios' %}" class="nav-link"><i class="bi bi-people-fill"></i></i> Usuarios</a></li>
            
            <!--<li class="nav-item mb-1"><a href="#" class="nav-link active"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
            <li class="nav-item mb-1"><a href="#" class="nav-link"><i class="bi bi-clock-history me-2"></i> Consultas</a></li>
            <li class="nav-item mb-1"><a href="#" class="nav-link"><i class="bi bi-exclamation-triangle me-2"></i> Alertas</a></li>-->
        </ul>
    </div>

    <!-- Contenido Principal -->
    <div class="contenedor-madre">
        <nav class="barra-superior">                       
                    <div class="dropdown">
                        <a class="nombre-usuario" href="#" data-bs-toggle="dropdown">
                                <h6 class="fw-semibold" style="margin:0px">{{ user }}</h6>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <form method="POST" action="{% url 'logout' %}">
                                    {% csrf_token %}
                                    <button type="submit" class="dropdown-item text-danger">Cerrar Sesión</button>
                                </form>
                            </li>
                        </ul>
                    </div>
        </nav>   
        <div class="contenido-principal">
            {% block contenido %}
            {% endblock %}
        </div>
    </div>
    
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/base.js' %}"></script>
<script src="{% static 'js/mensajes-personalizados.js' %}"></script>

</body>
</html>
