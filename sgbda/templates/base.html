{% load static %}

<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/bases_de_datos.css' %}">

</head>

<body>

<div class="contenedor-abuela">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="contenedor-titulo-p">
            <i class="bi bi-database-fill fs-3 text-primary me-2"></i>
            <h4 class="mb-0 fw-bold">Proyecto SGBDA</h4>
        </div>
        
        <ul class="nav flex-column">
            <li class="nav-item mb-1"><a href="#" class="nav-link active"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
            <li class="nav-item mb-1"><a href="#" class="nav-link"><i class="bi bi-diagram-3 me-2"></i> Bases de Datos</a></li>
            <li class="nav-item mb-1"><a href="#" class="nav-link"><i class="bi bi-graph-up me-2"></i> usuarios</a></li>
            <li class="nav-item mb-1"><a href="#" class="nav-link"><i class="bi bi-clock-history me-2"></i> Consultas</a></li>
            <li class="nav-item mb-1"><a href="#" class="nav-link"><i class="bi bi-exclamation-triangle me-2"></i> Alertas</a></li>
        </ul>
    </div>

    <!-- Contenido Principal -->
    <div class="contenedor-madre">
        <nav class="barra-superior">                       
                    <div class="dropdown">
                        <a class="nombre-usuario" href="#" data-bs-toggle="dropdown">
                                <h6 class="fw-semibold">Julian</h6>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <form method="POST" action="{% url 'logout' %}">
                                    {% csrf_token %}
                                    <button type="submit" class="dropdown-item text-danger">Cerrar Sesión</button>
                                </form>
                            </li>
                        </ul>
                    </div>
        </nav>

        <div class="contenido-principal">
            {% block contenido %}
            {% endblock %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/base.js' %}"></script>

</body>
</html>
